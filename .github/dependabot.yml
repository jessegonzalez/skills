# Dependabot — keeps GitHub Actions and Python deps current.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # GitHub Actions versions (ci.yml, etc.)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
      include: scope
    labels:
      - dependencies
      - github-actions

  # Python deps declared inline (PEP 723 scripts) and in requirements.txt.
  - package-ecosystem: pip
    directory: /plugins/argo-rollouts/skills/argo-rollouts
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
      include: scope
    labels:
      - dependencies
      - python
