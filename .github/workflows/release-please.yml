name: Release

# release-please maintains CHANGELOG.md, bumps the version, and cuts tags
# from Conventional Commits (already enforced by githooks/commit-msg).
# It keeps a running "release PR"; merging that PR publishes the new version.
# Manifest mode (release-please-config.json + .release-please-manifest.json)
# bumps version across the marketplace catalog (nested jsonpath), plugin
# manifest, and SKILL.md (generic `x-release-please-version` marker).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
