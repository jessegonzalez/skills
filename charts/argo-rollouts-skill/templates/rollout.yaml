apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "argo-rollouts-skill.fullname" . }}
  labels:
    {{- include "argo-rollouts-skill.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "argo-rollouts-skill.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "argo-rollouts-skill.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "argo-rollouts-skill.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.image.port }}
  strategy:
    {{- if eq .Values.strategy "canary" }}
    canary:
      {{- if .Values.canary.trafficRouting.enabled }}
      canaryService: {{ include "argo-rollouts-skill.fullname" . }}-canary
      stableService: {{ include "argo-rollouts-skill.fullname" . }}-stable
      trafficRouting:
        {{- toYaml .Values.canary.trafficRouting.config | nindent 8 }}
      {{- end }}
      {{- with .Values.canary.steps }}
      steps:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.analysis.enabled }}
      analysis:
        templates:
          - templateName: {{ include "argo-rollouts-skill.fullname" . }}
        {{- with .Values.analysis.startingStep }}
        startingStep: {{ . }}
        {{- end }}
      {{- end }}
    {{- else if eq .Values.strategy "bluegreen" }}
    blueGreen:
      activeService: {{ include "argo-rollouts-skill.fullname" . }}-active
      {{- if .Values.bluegreen.previewService }}
      previewService: {{ include "argo-rollouts-skill.fullname" . }}-preview
      {{- end }}
      autoPromotionEnabled: {{ .Values.bluegreen.autoPromotionEnabled }}
      scaleDownDelaySeconds: {{ .Values.bluegreen.scaleDownDelaySeconds }}
    {{- end }}
