{{/* Services for traffic routing. Canary+routing => stable+canary; bluegreen => active(+preview). */}}
{{- if eq .Values.strategy "canary" }}
  {{- if .Values.canary.trafficRouting.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "argo-rollouts-skill.fullname" . }}-stable
  labels:
    {{- include "argo-rollouts-skill.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "argo-rollouts-skill.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "argo-rollouts-skill.fullname" . }}-canary
  labels:
    {{- include "argo-rollouts-skill.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "argo-rollouts-skill.selectorLabels" . | nindent 4 }}
  {{- end }}
{{- else if eq .Values.strategy "bluegreen" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "argo-rollouts-skill.fullname" . }}-active
  labels:
    {{- include "argo-rollouts-skill.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "argo-rollouts-skill.selectorLabels" . | nindent 4 }}
{{- if .Values.bluegreen.previewService }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "argo-rollouts-skill.fullname" . }}-preview
  labels:
    {{- include "argo-rollouts-skill.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "argo-rollouts-skill.selectorLabels" . | nindent 4 }}
{{- end }}
{{- end }}
